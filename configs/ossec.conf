<!--
  ossec.conf — Wazuh Manager Configuration (Lab Environment)
  Author: Kshitiz
  Description: Sample configuration used in the Wazuh SIEM lab project.
  Location on server: /var/ossec/etc/ossec.conf
-->
<ossec_config>

  <!-- ========================================================
       GLOBAL SETTINGS
  ======================================================== -->
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>
    <smtp_server>smtp.example.wcom</smtp_server>
    <email_from>wazuh@example.com</email_from>
    <email_to>admin@example.com</email_to>
    <email_maxperhour>12</email_maxperhour>
    <email_log_source>alerts.log</email_log_source>
    <agents_disconnection_time>10m</agents_disconnection_time>
    <agents_disconnection_alert_time>0</agents_disconnection_alert_time>
  </global>

  <!-- ========================================================
       ALERT THRESHOLDS
  ======================================================== -->
  <alerts>
    <!-- Write all alerts Level 3+ to the alerts log -->
    <log_alert_level>3</log_alert_level>
    <!-- Only email for Level 12+ (critical) -->
    <email_alert_level>12</email_alert_level>
  </alerts>

  <!-- ========================================================
       FILE INTEGRITY MONITORING (FIM)
       Monitors file changes on critical system paths
  ======================================================== -->
  <syscheck>
    <!-- Full scan frequency in seconds (300 = 5 minutes for lab) -->
    <frequency>300</frequency>

    <!-- Scan when the daemon starts -->
    <scan_on_start>yes</scan_on_start>

    <!-- Alert when a file is created in monitored directories -->
    <alert_new_files>yes</alert_new_files>

    <!-- Skip files that have been modified during an alert -->
    <auto_ignore frequency="10" timeframe="3600">no</auto_ignore>

    <!-- Critical system paths — real-time monitoring -->
    <directories check_all="yes" realtime="yes">/etc</directories>
    <directories check_all="yes" realtime="yes">/usr/bin,/usr/sbin</directories>
    <directories check_all="yes">/bin,/sbin,/boot</directories>

    <!-- User home directories -->
    <directories check_all="yes">/home</directories>

    <!-- Temporary directories (common malware drop location) -->
    <directories check_all="yes">/tmp</directories>

    <!-- Files to exclude (reduce noise from legitimate frequent changes) -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/httpd/logs</ignore>
    <ignore>/etc/utmpx</ignore>
    <ignore>/etc/wtmpx</ignore>
    <ignore>/etc/cups/certs</ignore>
    <ignore>/etc/dumpdates</ignore>
    <ignore>/etc/svc/volatile</ignore>

    <!-- Ignore log files and temp files by regex -->
    <ignore type="sregex">.log$|.swp$|.tmp$|.pid$</ignore>

    <!-- Maximum file size to check (in MB) -->
    <max_files_per_second>100</max_files_per_second>
  </syscheck>

  <!-- ========================================================
       ROOTKIT DETECTION
  ======================================================== -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <!-- Scan frequency in seconds (36000 = 10 hours) -->
    <frequency>36000</frequency>
    <rootkit_files>etc/rootcheck/rootkit_files.txt</rootkit_files>
    <rootkit_trojans>etc/rootcheck/rootkit_trojans.txt</rootkit_trojans>
    <skip_nfs>yes</skip_nfs>
  </rootcheck>

  <!-- ========================================================
       LOG COLLECTION — Collect logs from local files on the Manager
  ======================================================== -->

  <!-- Authentication logs (SSH, sudo, PAM) -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <!-- General system messages -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <!-- Kernel messages -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/kern.log</location>
  </localfile>

  <!-- Package installation/removal -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/dpkg.log</location>
  </localfile>

  <!-- Disk usage monitoring (every 10 minutes) -->
  <localfile>
    <log_format>command</log_format>
    <command>df -P</command>
    <frequency>600</frequency>
  </localfile>

  <!-- Listening ports monitoring -->
  <localfile>
    <log_format>full_command</log_format>
    <command>netstat -tulpn | sed 's/\([[:alnum:]]\+\)\/.*$/\1/'</command>
    <alias>netstat listening ports</alias>
    <frequency>360</frequency>
  </localfile>

  <!-- Last logged in users -->
  <localfile>
    <log_format>full_command</log_format>
    <command>last -n 20</command>
    <frequency>360</frequency>
  </localfile>

  <!-- ========================================================
       ACTIVE RESPONSE
       (Disabled in lab — enable to automatically block attackers)
  ======================================================== -->
  <!--
  <active-response>
    <command>firewall-drop</command>
    <location>local</location>
    <rules_id>5720</rules_id>  <- Trigger on SSH brute force
    <timeout>600</timeout>     <- Block for 10 minutes
  </active-response>
  -->

</ossec_config>
